<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            margin: 0;
            padding: 0;
        }
        a{
            text-decoration: none;
            color: aliceblue;
        }
        ul{
            display: flex;
            list-style: none;
            justify-content: center;
            background-color: rgb(51, 63, 63);
        }
        li{
            padding: 26px;
            border-right: 1px solid brown;
            position: relative;
        }
        ul li:last-child { 
            border-right: none;

        }
        li:hover >a {
            color: green;
        }
        .menu-2{
            position: absolute;
            top: 100%;
            left: 0;
            display: none;
        }
        .menu-2> li{
            border: none;
        }
        li:hover .menu-2{
            display: block;

        }

    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#">Trang chủ</a></li>
            <li><a href="#">Sản phẩm</a>
                <ul class="menu-2">
                    <li><a href="#">css3</a></li>
                    <li><a href="#">html5</a></li>
                    <li><a href="#">php</a></li>
                </ul>
            </li>
            <li><a href="#">dịch vụ</a></li>
            <li><a href="#">Liên hệ</a></li>
            <li><a href="#">Giới thiệu</a></li>
        </ul>
    </nav>
</body>
</html>
