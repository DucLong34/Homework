<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex4</title>
    <style>
      body {
        margin: 100px;
      }
      .banner {
        width: 500px;
        height: 300px;
        border-radius: 15px;

        background:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500")
            no-repeat center/cover;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 15px;

        color: white;
        text-align: center;
        font-family: Arial, sans-serif;
      }

      .banner h1 {
        margin: 0;
        font-size: 28px;
        font-family: "Times New Roman", serif;
      }

      .banner p {
        margin: 0;
        font-size: 16px;
      }

      .btn {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.6);
        color: white;
        padding: 10px 35px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
    <body></body>
  </head>
  <body>
    <div class="banner">
      <h1>Du lịch Đà Nẵng</h1>
      <p>Biển xanh – nắng vàng – trải nghiệm tuyệt vời</p>
      <button class="btn">Xem thêm</button>
    </div>
  </body>
</html>
